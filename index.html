<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Navigation Buttons</title>
    <style>
        :root {
            /* Button Colors */
            --color-true-false: #ef4444;      /* Red */
            --color-fill-blank: #f59e0b;      /* Amber/Orange */
            --color-multiple: #10b981;        /* Emerald/Green */
            
            --bg-base: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* Phone Viewport Container */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 732px;
            background: var(--bg-card);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 8px solid #1e293b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Top Status Bar */
        .status-bar {
            height: 24px;
            background: #1e293b;
            color: #ffffff;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-weight: 500;
        }

        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        header {
            margin-bottom: 28px;
            text-align: center;
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Vertical Button Navigation Layout (အပေါ်အောက် တန်းစီစနစ်) */
        .buttons-nav {
            display: flex;
            flex-direction: column; /* အပေါ်အောက် ထားရန် */
            gap: 14px;              /* ခလုတ်တစ်ခုစီကြား အကွာအဝေး */
            margin-bottom: 28px;
        }

        /* Base Button Style */
        .nav-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            text-align: center;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, opacity 0.2s ease, box-shadow 0.2s ease;
        }

        .nav-btn:active {
            transform: scale(0.97);
            box-shadow: 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* ခလုတ်များအား ကာလာ သီးသန့်စီ ခွဲပေးထားခြင်း */
        .btn-true {
            background-color: var(--color-true-false);
        }
        .btn-true:hover {
            background-color: #dc2626;
        }

        .btn-fill {
            background-color: var(--color-fill-blank);
        }
        .btn-fill:hover {
            background-color: #d97706;
        }

        .btn-multiple {
            background-color: var(--color-multiple);
        }
        .btn-multiple:hover {
            background-color: #059669;
        }

        /* Preview Display Area */
        .preview-card {
            flex: 1;
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .preview-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .preview-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .preview-desc {
            font-size: 12px;
            color: var(--text-muted);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Mock Mobile Phone Status Bar -->
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋 100%</span>
        </div>

        <div class="screen-content">
            <header>
                <h1>မေးခွန်းပုံစံများ</h1>
                <p>လေ့ကျင့်လိုသော မေးခွန်းခလုတ်ကို နှိပ်ပါ</p>
            </header>

            <!-- အပေါ်အောက် အစီအစဉ်အတိုင်း အရောင်ခွဲထားသော Button များ -->
            <nav class="buttons-nav">
                <a href="true.html" class="nav-btn btn-true" id="btn-true">True or False</a>
                <a href="fill.html" class="nav-btn btn-fill" id="btn-fill">Fill in the blank</a>
                <a href="multiple.html" class="nav-btn btn-multiple" id="btn-multiple">Multiple Choice</a>
            </nav>

            <!-- Dynamic Content Preview via JavaScript -->
            <div class="preview-card">
                <div class="preview-icon" id="preview-icon">📱</div>
                <div class="preview-title" id="preview-title">စမ်းသပ်ခန်း</div>
                <div class="preview-desc" id="preview-desc">အပေါ်က Button တစ်ခုခုကို နှိပ်ပြီး ၎င်းတို့ သွားမယ့် လင့်ခ်လမ်းကြောင်း (href) ကို ကြည့်နိုင်ပါတယ်။</div>
            </div>
        </div>
    </div>

    <script>
        // Button များ နှိပ်လိုက်သည့်အခါ Action ပြောင်းလဲစေရန် JavaScript ရေးသားထားခြင်း
        document.querySelectorAll('.nav-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                // လက်ရှိ စမ်းသပ်မှုလွယ်ကူစေရန် သီးသန့် href page သို့ တိုက်ရိုက်မသွားစေဘဲ preview ပြပေးရန် event တားဆီးထားနိုင်သည် (လိုအပ်က e.preventDefault() သုံးနိုင်)
                // ဤနေရာတွင် မူရင်းအတိုင်း သွားစေလိုပါက e.preventDefault() မထည့်ပါနှင့်။
                e.preventDefault(); 
                
                const href = this.getAttribute('href');
                const name = this.innerText;
                
                document.getElementById('preview-title').innerText = name;
                document.getElementById('preview-desc').innerText = `သွားမည့် လင့်ခ်ဖိုင်အမည်မှာ "${href}" ဖြစ်ပါသည်။`;

                // Icon ပြောင်းလဲခြင်း
                if(href.includes('true')) document.getElementById('preview-icon').innerText = "❌✔️";
                if(href.includes('fill')) document.getElementById('preview-icon').innerText = "✍️";
                if(href.includes('multiple')) document.getElementById('preview-icon').innerText = "🔢";
            });
        });
    </script>

</body>
</html>
