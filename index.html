<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz Navigation Links</title>
    <style>
        :root {
            /* Button များအတွက် သီးသန့်အရောင်များ */
            --color-true-false: #ef4444;      /* အနီရောင် */
            --color-fill-blank: #f59e0b;      /* အဝါရင့်ရောင် */
            --color-multiple: #10b981;        /* အစိမ်းရောင် */
            
            --bg-base: #f1f5f9;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }

        /* ဖုန်းမျက်နှာပြင် (Mobile Viewport) ပုံစံ ကန့်သတ်ချက် */
        .phone-container {
            width: 100%;
            max-width: 412px;
            height: 732px;
            background: var(--bg-card);
            border-radius: 36px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            border: 8px solid #1e293b;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* ထိပ်ဆုံးက ဖုန်း Status Bar အလှဆင်ခြင်း */
        .status-bar {
            height: 24px;
            background: #1e293b;
            color: #ffffff;
            font-size: 11px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 24px;
            font-weight: 500;
        }

        .screen-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 24px;
            overflow-y: auto;
        }

        header {
            margin-bottom: 28px;
            text-align: center;
        }

        header h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Button များကို အပေါ်အောက် ထားရှိရန် Layout */
        .buttons-nav {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        /* <a> tag ကို ခလုတ် (Button) ပုံစံ ပြောင်းလဲခြင်း */
        .nav-btn {
            display: block;
            width: 100%;
            padding: 16px 20px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            text-decoration: none; /* အောက်ခံလိုင်း ဖျောက်ရန် */
            text-align: center;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: transform 0.1s ease, background-color 0.2s ease;
        }

        /* ခလုတ်နှိပ်လိုက်သည့်အခါ တုံ့ပြန်မှုပြရန် */
        .nav-btn:active {
            transform: scale(0.97);
        }

        /* ခလုတ်တစ်ခုချင်းစီ၏ သီးသန့် Background အရောင်များ */
        .btn-true {
            background-color: var(--color-true-false);
        }
        .btn-true:hover {
            background-color: #dc2626;
        }

        .btn-fill {
            background-color: var(--color-fill-blank);
        }
        .btn-fill:hover {
            background-color: #d97706;
        }

        .btn-multiple {
            background-color: var(--color-multiple);
        }
        .btn-multiple:hover {
            background-color: #059669;
        }

        /* တိုးတက်မှု အခြေအနေပြ ကတ်ပြားပုံစံ */
        .status-card {
            flex: 1;
            background: #f8fafc;
            border: 2px dashed #e2e8f0;
            border-radius: var(--radius);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .card-icon {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .card-text {
            font-size: 13px;
            color: var(--text-muted);
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="phone-container">
        <div class="status-bar">
            <span>9:41</span>
            <span>📶 🔋 100%</span>
        </div>

        <div class="screen-content">
            <header>
                <h1>Quiz Menu</h1>
                <p>ဖြေဆိုလိုသည့် မေးခွန်းခလုတ်ကို နှိပ်ပါ</p>
            </header>

            <nav class="buttons-nav">
                <a href="true.html" class="nav-btn btn-true">True or False</a>
                <a href="fill.html" class="nav-btn btn-fill">Fill in the blank</a>
                <a href="multiple.html" class="nav-btn btn-multiple">Multiple Choice</a>
            </nav>

            <div class="status-card">
                <div class="card-icon">🚀</div>
                <div class="card-text">ခလုတ်တစ်ခုခုကို နှိပ်လိုက်ပါက သတ်မှတ်ထားသော .html Page များဆီသို့ တိုက်ရိုက် ရောက်ရှိသွားမည် ဖြစ်ပါသည်။</div>
            </div>
        </div>
    </div>

    <script>
        // စာမျက်နှာ အပြန်အလှန် အကျိုးသက်ရောက်မှု ရှိစေရန် ကြိုဆိုကြောင်း စာတန်းပြသသည့် JavaScript
        document.addEventListener('DOMContentLoaded', () => {
            console.log("Quiz Navigation Link system is active and ready.");
        });
    </script>

</body>
</html>
