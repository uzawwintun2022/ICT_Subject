<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Quiz: Fill in the Blanks</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --text-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #2ecc71;
            --error-color: #e74c3c;
            --border-color: #bdc3c7;
            --nav-bg: #34495e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            color: #2c3e50;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #7f8c8d;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .quiz-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed #e0e0e0;
            font-size: 16px;
        }

        .quiz-item:last-child {
            border-bottom: none;
        }

        .q-num {
            font-weight: bold;
            color: var(--accent-color);
            margin-right: 5px;
        }

        .blank-input {
            border: none;
            border-bottom: 2px solid var(--border-color);
            background: transparent;
            padding: 2px 5px;
            font-size: 16px;
            color: #2c3e50;
            text-align: center;
            transition: all 0.3s ease;
            outline: none;
            width: 140px;
            font-weight: 600;
        }

        .blank-input:focus {
            border-bottom-color: var(--accent-color);
            background-color: rgba(52, 152, 219, 0.05);
        }

        .blank-input.correct {
            border-bottom-color: var(--success-color);
            color: var(--success-color);
            background-color: rgba(46, 204, 113, 0.05);
        }

        .blank-input.incorrect {
            border-bottom-color: var(--error-color);
            color: var(--error-color);
            background-color: rgba(231, 76, 60, 0.05);
        }

        .feedback {
            display: inline-block;
            margin-left: 10px;
            font-size: 14px;
            font-weight: bold;
        }

        .feedback.correct {
            color: var(--success-color);
        }

        .feedback.incorrect {
            color: var(--error-color);
        }

        .actions-bar {
            padding: 15px 0;
            border-top: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            gap: 15px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
        }

        .btn-check {
            background-color: var(--accent-color);
            color: white;
        }

        .btn-check:hover {
            background-color: #2980b9;
        }

        .btn-reset {
            background-color: #e67e22;
            color: white;
        }

        .btn-reset:hover {
            background-color: #d35400;
        }

        .score-display {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            display: none;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 6px;
        }

        /* Bottom Navigation Menu Styles */
        .bottom-nav {
            max-width: 800px;
            margin: 0 auto;
            background: var(--nav-bg);
            padding: 15px;
            border-radius: 12px;
            display: flex;
            justify-content: space-around;
            gap: 10px;
            flex-wrap: wrap;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.1);
            font-weight: bold;
            font-size: 15px;
            transition: background 0.3s ease;
            text-align: center;
            min-width: 100px;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .nav-link.back-btn {
            background: #e74c3c;
        }
        .nav-link.back-btn:hover {
            background: #c0392b;
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            body {
                padding: 10px 5px;
            }
            .container {
                padding: 20px 15px;
            }
            h1 {
                font-size: 20px;
            }
            .quiz-item {
                font-size: 15px;
            }
            .blank-input {
                width: 110px;
                font-size: 15px;
            }
            button {
                padding: 10px 15px;
                font-size: 14px;
            }
            .bottom-nav {
                flex-direction: column;
                gap: 8px;
            }
            .nav-link {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fill in the Blanks Quiz</h1>
    <p class="subtitle">Test your knowledge. Fill in the underlined inputs and click "Check Answers".</p>

    <div class="score-display" id="score-container"></div>

    <div id="quiz-form"></div>

    <div class="actions-bar">
        <button type="button" class="btn-check" onclick="checkAnswers()">Check Answers</button>
        <button type="button" class="btn-reset" onclick="resetAndShuffleQuiz()">Reset & Randomize Order</button>
    </div>
</div>

<!-- Bottom Navigation Links Area -->
<div class="bottom-nav">
    <a href="index.html" class="nav-link back-btn">Back</a>
    <a href="true.html" class="nav-link">True / False</a>
    <a href="multiple.html" class="nav-link">Multiple Choice</a>
</div>

<script>
    // Original list of questions
    const originalQuizData = [
        { num: 1, left: "Information assets are a valuable resource that needs ", right: ".", answer: "protection" },
        { num: 2, left: "", right: " threats are attacks that are conducted by employees or contractors within organizations.", answer: "Internet" },
        { num: 3, left: "", right: " code refers to programs that cause damage to a system when executed.", answer: "Malicious" },
        { num: 4, left: "There are ", right: " types of cyber threats.", answer: "two" },
        { num: 5, left: "A ", right: " is computer or system that server provides resources, data services, or program to other computer, known as clients, over a network.", answer: "server" },
        { num: 6, left: "Application software includes two types General program: ", right: " Purpose Software and Specific Purpose Software.", answer: "General" },
        { num: 7, left: "\"RAM\" is a ", right: " type of memory in which stored contents is lost when the power is turned off.", answer: "volatile" },
        { num: 8, left: "Operating System acts as an intermediary between the ", right: " and the hardware.", answer: "user" },
        { num: 9, left: "Multimedia file types include static images, ", right: " and audio.", answer: "video" },
        { num: 10, left: "", right: " is an international standard data format for color video.", answer: "MPEG" },
        { num: 11, left: "", right: " image format supports 24-bit color image and is suited for photographic.", answer: "JPEG" },
        { num: 12, left: "", right: " file type is the data can be compressed to about 1/10 the size of a music CD.", answer: "MP3" },
        { num: 13, left: "Small, Stand-alone Screen provided within the operational screen is called ", right: ".", answer: "window" },
        { num: 14, left: "A ", right: " consists of two or more computers (or) devices.", answer: "network" },
        { num: 15, left: "", right: " is used in communication between the banks in a city.", answer: "MAN" },
        { num: 16, left: "Hub distributes this request to all the interconnected ", right: ".", answer: "computers" },
        { num: 17, left: "A ", right: " is a set of rules for data communication between computers over a network.", answer: "protocol" },
        { num: 18, left: "Peer-To-Peer network has no ", right: " server.", answer: "dedicated" },
        { num: 19, left: "Today, mobility is increasingly being accepted as a part of daily", right: ".", answer: "life" },
        { num: 20, left: "Today, the governments have to ", right: " their activities according to this demand.", answer: "transform" },
        { num: 21, left: "The Internet of Things (IoT) fundamentally redefines how devices and systems interact by connecting sensors, actuators, and ", right: " processing units over networks.", answer: "data" },
        { num: 22, left: "The Internet of Things (IoT) is not merely a technology upgrade-it represents a transformative shift toward a ", right: "-driven, interconnected public sector.", answer: "data" },
        { num: 23, left: "In the Internet of Things (IoT), sensors and actuators are the eyes, ears and muscles of an IoT system-collecting real-world ", right: " and performing physical actions.", answer: "data" },
        { num: 24, left: "At their core, these tools harness artificial intelligence to analyzed personal ", right: " gathered form activities like journaling, daily routines, or even social interactions.", answer: "data" },
        { num: 25, left: "This integration helps users better understand their strengths, weaknesses, and opportunities for ", right: ".", answer: "growth" },
        { num: 26, left: "In Personalized Coaching and ", right: ", modern platforms use Artificial Intelligence to assist with reflective journaling.", answer: "Journaling" },
        { num: 27, left: "In Personalized Coaching and Journaling, analyzing text entries, detecting recurring emotional states, and even suggesting topics or techniques to enhance self-awareness is called the reflective ", right: ".", answer: "journaling" },
        { num: 28, left: "We use Artificial Intelligence (AI) to analyze personal data such as ", right: " records, behavioral patterns, and emotional makers to offer individualized insights.", answer: "journaling" }
    ];

    // Working array that will be shuffled
    let currentQuizData = [...originalQuizData];

    // Shuffle function (Fisher-Yates algorithm)
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    function loadQuiz() {
        const container = document.getElementById('quiz-form');
        container.innerHTML = '';
        
        currentQuizData.forEach((q, index) => {
            const item = document.createElement('div');
            item.className = 'quiz-item';
            
            // Build text with inline input box (displays the original original question number q.num)
            item.innerHTML = `
                <span class="q-num">${index + 1}.</span>
                ${q.left}
                <input type="text" class="blank-input" id="q-${index}" autocomplete="off" placeholder="type answer...">
                ${q.right}
                <span id="feedback-${index}" class="feedback"></span>
            `;
            container.appendChild(item);
        });
    }

    function checkAnswers() {
        let correctCount = 0;
        
        currentQuizData.forEach((q, index) => {
            const inputEl = document.getElementById(`q-${index}`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const userAns = inputEl.value.trim().toLowerCase();
            const correctAns = q.answer.toLowerCase();
            
            if (userAns === correctAns) {
                inputEl.className = "blank-input correct";
                feedbackEl.innerHTML = "✓";
                feedbackEl.className = "feedback correct";
                correctCount++;
            } else {
                inputEl.className = "blank-input incorrect";
                feedbackEl.innerHTML = `✗ (Correct: ${q.answer})`;
                feedbackEl.className = "feedback incorrect";
            }
        });

        const scoreContainer = document.getElementById('score-container');
        scoreContainer.innerHTML = `Your Score: ${correctCount} / ${currentQuizData.length}`;
        scoreContainer.style.display = 'block';
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function resetAndShuffleQuiz() {
        // Clear inputs and score display
        document.getElementById('score-container').style.display = 'none';
        
        // Randomize the quiz items sequence
        shuffleArray(currentQuizData);
        
        // Re-render the randomized content
        loadQuiz();
    }

    // Initialize quiz on load
    window.onload = loadQuiz;
</script>

</body>
</html>
